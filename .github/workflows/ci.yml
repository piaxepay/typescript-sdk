name: TypeScript SDK CI

on:
  pull_request:
    paths:
      - ".github/workflows/ci.yml"
      - "contracts/**"
      - "examples/**"
      - "scripts/**"
      - "src/**"
      - "tests/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - "tsconfig.contract-tests.json"
      - "README.md"
      - "ARCHITECTURE.md"
      - "SANDBOX_ONBOARDING.md"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/ci.yml"
      - "contracts/**"
      - "examples/**"
      - "scripts/**"
      - "src/**"
      - "tests/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - "tsconfig.contract-tests.json"
      - "README.md"
      - "ARCHITECTURE.md"
      - "SANDBOX_ONBOARDING.md"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - name: Install dependencies
        run: npm ci
      - name: Type check
        run: npm run typecheck
      - name: Run contract tests
        run: npm run test:contract
      - name: Build package
        run: npm run build
      - name: Inspect package
        run: npm run pack:check
